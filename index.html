<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Randomize Bot App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #84c474; /* Насыщенный зеленый фон как на скринах */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .card {
            background: white;
            padding: 40px 20px;
            border-radius: 25px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 85%;
            max-width: 320px;
        }
        .dice {
            font-size: 90px;
            margin-bottom: 25px;
            display: inline-block;
        }
        .animate-dice {
            animation: spin 0.6s ease-in-out infinite;
        }
        h2 {
            font-size: 18px;
            font-weight: bold;
            margin: 15px 0 5px 0;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .checkmark {
            color: #2ed573;
            font-weight: bold;
        }
        .gift-container {
            position: fixed;
            bottom: 30px;
            width: 90%;
            max-width: 340px;
            text-align: center;
            display: none; /* Появляется только после завершения кручения кубика */
        }
        .gift-text {
            color: white;
            font-size: 13px;
            margin-bottom: 10px;
            font-weight: 500;
        }
        .btn-gift {
            background: linear-gradient(90deg, #b15fe3, #783cc7);
            color: white;
            border: none;
            padding: 15px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(120, 60, 199, 0.4);
        }
        @keyframes spin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="dice" class="dice">🎲</div>
        <h2 id="status-title">Проверка подписки на каналы...</h2>
    </div>

    <div id="gift-box" class="gift-container">
        <div class="gift-text">За участие в розыгрыше Вам доступен подарок 🧸</div>
        <button class="btn-gift" onclick="sendDataToBot()">Забрать подарок!</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Открываем приложение сразу на весь экран смартфона

        const diceEl = document.getElementById('dice');
        const titleEl = document.getElementById('status-title');
        const giftBox = document.getElementById('gift-box');

        // Включаем анимацию вращения кубика
        diceEl.classList.add('animate-dice');

        // Ровно через 2 секунды останавливаем кубик и выводим статус
        setTimeout(() => {
            diceEl.classList.remove('animate-dice');
            
            // Текст и галочка в точности как на твоем оригинале
            titleEl.innerHTML = `<span class="checkmark">✔</span> Вы уже участвуете в этом розыгрыше!`;
            
            // Плавно показываем кнопку подарка
            giftBox.style.display = 'block';
        }, 2000);

        function sendDataToBot() {
            // ВНИМАНИЕ: Замени HelperChatBot_bot на юзернейм ТВОЕГО бота (без знака @)
            const botUsername = "helperchatmoderator_bot"; 
            
            // Закрываем окно приложения и перенаправляем пользователя в чат с командой регистрации
            tg.openTelegramLink(`https://t.me/${botUsername}?start=join`);
            tg.close();
        }
    </script>
</body>
</html>
